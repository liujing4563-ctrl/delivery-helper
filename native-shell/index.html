<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>骑手权益助手</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #2563eb;
        color: white;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 320px;
        padding: 32px 24px;
        text-align: center;
      }

      .icon {
        width: 96px;
        height: 96px;
        margin: 0 auto 24px;
        background: rgba(255,255,255,0.15);
        border-radius: 24px;
        display: grid;
        place-items: center;
        font-size: 48px;
        font-weight: bold;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 700;
      }

      p {
        margin: 0;
        color: rgba(255,255,255,0.75);
        line-height: 1.7;
        font-size: 14px;
      }

      .spinner {
        width: 32px;
        height: 32px;
        margin: 24px auto 0;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">权</div>
      <h1>骑手权益助手</h1>
      <p>正在加载应用…</p>
      <div class="spinner"></div>
    </main>
    <script>
      // Capacitor 会在 server URL 配置好后自动替换此页面内容。
      // 如果看到此页面超过 10 秒，说明 CAPACITOR_SERVER_URL 未配置或服务不可达。
      setTimeout(function() {
        var p = document.querySelector('p');
        if (p) p.textContent = '服务暂不可达，请检查 CAPACITOR_SERVER_URL 配置后重新同步。';
      }, 10000);
    </script>
  </body>
</html>
